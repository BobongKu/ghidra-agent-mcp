services:
  ghidra-agent-mcp:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "18089:8089"
    volumes:
      - ./binaries:/binaries        # Binary files to analyze
      - ghidra-data:/data            # Ghidra project storage
      # - ./extensions:/extensions   # Optional: Ghidra extensions
    environment:
      - GHIDRA_MCP_PORT=8089
      - BIND_ADDRESS=0.0.0.0
      - AUTO_IMPORT=false
    mem_limit: 4g
    restart: unless-stopped

volumes:
  ghidra-data:
